services:
    web:
      build: 
        context: ./backend
        dockerfile: Dockerfile
      container_name: web
      env_file:
        - dev.env
      ports: 
        - "8000:8000"
      restart: always
      depends_on:
        postgres:
          condition: service_healthy
    postgres:
        image: 'postgres:17'
        container_name: postgres
        restart: always
        env_file:
          - dev.env
        ports:
          - "5433:5432"
        volumes:
          - db_data:/var/lib/postgresql/data
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U postgres -d TodoDB"]
          interval: 5s
          retries: 5
    
volumes:
  db_data: